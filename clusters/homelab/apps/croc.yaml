---
apiVersion: v1
kind: Namespace
metadata:
  name: croc
---
# NOTE: the CROC_PASS Secret is deliberately NOT managed here.
# Flux would overwrite it with a placeholder and the password would live in git.
# Create it out-of-band before the first rollout:
#
#   kubectl create secret generic croc-secret \
#     --namespace=croc \
#     --from-literal=CROC_PASS="$(openssl rand -base64 24)"
#
# See docs/Apps/croc.md.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: croc
  namespace: croc
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: croc
  template:
    metadata:
      labels:
        app: croc
    spec:
      containers:
        - name: croc
          # No command override on purpose: the image's default entrypoint is
          # `croc relay`, which listens on 9009 (comms) + 9010-9013 (data).
          image: docker.io/schollz/croc:latest
          ports:
            - containerPort: 9009
              name: comms
            - containerPort: 9010
              name: data-1
            - containerPort: 9011
              name: data-2
            - containerPort: 9012
              name: data-3
            - containerPort: 9013
              name: data-4
          env:
            # croc binds CROC_PASS to its --pass flag. Relay and BOTH clients
            # must present the same value or the relay refuses the connection.
            - name: CROC_PASS
              valueFrom:
                secretKeyRef:
                  name: croc-secret
                  key: CROC_PASS
          readinessProbe:
            tcpSocket:
              port: 9009
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9009
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              # The relay only splices TCP streams; payloads are never buffered
              # whole, so transfer size does not drive memory.
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: croc
  namespace: croc
  annotations:
    # The tailscale operator gives this Service its own tailnet device, exposing
    # the REAL ports below (not a NodePort). Reachable only inside the tailnet.
    tailscale.com/expose: "true"
    tailscale.com/hostname: "croc"
    # tag:kubernetes is the tag the operator already assigns to all its proxies
    # (and carries itself). Its OAuth client is scoped to this tag, so a new tag
    # like tag:croc-relay would fail to register.
    tailscale.com/tags: "tag:kubernetes"
spec:
  type: ClusterIP
  ports:
    - port: 9009
      targetPort: 9009
      name: comms
    - port: 9010
      targetPort: 9010
      name: data-1
    - port: 9011
      targetPort: 9011
      name: data-2
    - port: 9012
      targetPort: 9012
      name: data-3
    - port: 9013
      targetPort: 9013
      name: data-4
  selector:
    app: croc
